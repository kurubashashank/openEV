name: warehouse-inventory-env
version: 1.0.0
description: >
  OpenEnv warehouse inventory management environment with three task
  difficulties and normalized reward signals.
author: MetaAI
license: MIT
tags:
  - openenv
  - warehouse
  - inventory
  - operations
  - forecasting

api:
  base_url: /
  endpoints:
    health:
      method: GET
      path: /health
    reset:
      method: POST
      path: /reset
      request_model: ResetRequest
      response_model: ResetResponse
    step:
      method: POST
      path: /step
      request_model: StepRequest
      response_model: StepResponse
    state:
      method: GET
      path: /state
      response_model: State
    tasks:
      method: GET
      path: /tasks
      response_model: TaskListResponse
    grade:
      method: POST
      path: /grade
      request_model: TaskGradeRequest
      response_model: TaskGradeResponse

tasks:
  - id: easy
    difficulty: easy
    description: Single warehouse, single product, stable demand with low variance
    reset_params:
      task_id: easy

  - id: medium
    difficulty: medium
    description: Single warehouse, three products, seasonal demand patterns
    reset_params:
      task_id: medium

  - id: hard
    difficulty: hard
    description: Multiple locations, multiple products, volatile demand with supply constraints
    reset_params:
      task_id: hard

action_space:
  type: object
  properties:
    order_quantities:
      type: array
      items:
        type: integer
        minimum: 0
  required:
    - order_quantities

observation_space:
  type: object
  properties:
    inventory_levels:
      type: array
      items:
        type: integer
    pending_orders:
      type: array
      items:
        type: integer
    demand_forecast:
      type: array
      items:
        type: integer
    current_step:
      type: integer
    holding_cost_accumulated:
      type: number
    stockout_penalty_accumulated:
      type: number

reward:
  min: 0.0001
  max: 0.9999
  description: >
    Normalized reward signal that always stays strictly within (0, 1).

grading:
  score_range: [0.0001, 0.9999]
  passing_threshold: 0.6
  metrics:
    - normalized_reward
