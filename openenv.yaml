version: "1.0"
name: "warehouse-inventory-env"
description: "Warehouse inventory management optimization environment for AI agents"
author: "MetaAI"
license: "MIT"

environment:
  name: "WarehouseInventoryEnv"
  description: "Multi-product warehouse inventory management with demand forecasting"
  
api:
  version: "1.0"
  endpoints:
    - path: "/reset"
      method: "POST"
      description: "Reset environment to initial state"
      request_schema: "$defs/ResetRequest"
      response_schema: "$defs/ResetResponse"
    
    - path: "/step"
      method: "POST"
      description: "Execute one step in the environment"
      request_schema: "$defs/StepRequest"
      response_schema: "$defs/StepResponse"
    
    - path: "/state"
      method: "GET"
      description: "Get current environment state"
      response_schema: "$defs/State"

observation_space:
  type: "object"
  properties:
    inventory_levels:
      type: "array"
      description: "Current inventory level for each product"
      items:
        type: "integer"
    pending_orders:
      type: "array"
      description: "Pending order quantities for each product"
      items:
        type: "integer"
    demand_forecast:
      type: "array"
      description: "Forecasted demand for next period for each product"
      items:
        type: "integer"
    current_step:
      type: "integer"
      description: "Current time step"
    holding_cost_accumulated:
      type: "number"
      description: "Accumulated holding costs"
    stockout_penalty_accumulated:
      type: "number"
      description: "Accumulated stockout penalties"

action_space:
  type: "object"
  description: "Agent action (order quantities)"
  properties:
    order_quantities:
      type: "array"
      description: "Order quantity for each product"
      items:
        type: "integer"
        minimum: 0

tasks:
  - id: "easy"
    name: "Easy Inventory Management"
    description: "Single warehouse, single product, stable demand with low variance"
    difficulty: "1"
    
  - id: "medium"
    name: "Medium Inventory Management"
    description: "Single warehouse, three products, seasonal demand patterns"
    difficulty: "2"
    
  - id: "hard"
    name: "Hard Inventory Management"
    description: "Multiple locations, multiple products, volatile demand with supply constraints"
    difficulty: "3"

reward:
  type: "float"
  range: [0.0001, 0.9999]
  description: "Normalized reward based on inventory efficiency, always strictly between 0.0 and 1.0"

defs:
  ResetRequest:
    type: "object"
    properties:
      task_id:
        type: "string"
        enum: ["easy", "medium", "hard"]
      seed:
        type: "integer"
        nullable: true
        description: "Random seed for reproducibility"
  
  ResetResponse:
    type: "object"
    properties:
      state:
        $ref: "#/$defs/State"
      task_id:
        type: "string"
  
  State:
    type: "object"
    properties:
      inventory_levels:
        type: "array"
        items:
          type: "integer"
      pending_orders:
        type: "array"
        items:
          type: "integer"
      demand_forecast:
        type: "array"
        items:
          type: "integer"
      current_step:
        type: "integer"
      holding_cost_accumulated:
        type: "number"
      stockout_penalty_accumulated:
        type: "number"
  
  StepRequest:
    type: "object"
    required:
      - action
    properties:
      action:
        $ref: "#/$defs/Action"
  
  Action:
    type: "object"
    properties:
      order_quantities:
        type: "array"
        items:
          type: "integer"
          minimum: 0
  
  StepResponse:
    type: "object"
    properties:
      state:
        $ref: "#/$defs/State"
      reward:
        type: "number"
        exclusiveMinimum: 0.0
        exclusiveMaximum: 1.0
      done:
        type: "boolean"
      info:
        type: "object"
        properties:
          step_reward:
            type: "number"
          costs:
            type: "object"
            properties:
              holding_cost:
                type: "number"
              stockout_penalty:
                type: "number"
          demand_satisfied:
            type: "array"
            items:
              type: "boolean"
